<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Your Shipment — SK Logistics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14213D;
    --paper:#EFE7D8;
    --paper-dark:#E4D9C2;
    --signal:#E8590C;
    --signal-dark:#C24710;
    --route:#2F6844;
    --warn:#B3261E;
    --cream:#FAF7F0;
    --line:#C9BC9E;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:var(--paper);
    color:var(--ink);
    font-family:'Work Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.02em;margin:0;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  a{color:inherit;}
  .wrap{max-width:720px;margin:0 auto;padding:0 20px;}

  .barcode{
    height:16px;
    background-repeat:repeat-x;
    background-image:repeating-linear-gradient(90deg,var(--ink) 0 2px,transparent 2px 5px,var(--ink) 5px 8px,transparent 8px 14px,var(--ink) 14px 15px,transparent 15px 22px);
    opacity:0.85;
  }

  .top-tabs{background:var(--cream);border-bottom:2px solid var(--ink);}
  .top-tabs .wrap{display:flex;gap:0;justify-content:center;}
  .top-tabs a{
    flex:1;text-align:center;text-decoration:none;color:var(--ink);
    font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.08em;
    text-transform:uppercase;padding:12px 10px;border-right:1px solid var(--line);
    transition:background .15s ease,color .15s ease;
  }
  .top-tabs a:last-child{border-right:none;}
  .top-tabs a:hover{background:var(--ink);color:var(--cream);}
  .top-tabs a .arrow{opacity:0.6;margin-left:4px;}
  @media(min-width:600px){.top-tabs a{flex:none;padding:12px 24px;}}

  header{background:var(--ink);color:var(--cream);padding:16px 0;border-bottom:3px solid var(--signal);}
  header .wrap{display:flex;flex-direction:column;}
  .brand-name{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;letter-spacing:0.04em;}
  .brand-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.12em;color:var(--signal);margin-top:3px;}

  .hero{padding:44px 0 30px;text-align:center;}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.14em;color:var(--signal-dark);margin-bottom:10px;}
  .hero h1{font-size:clamp(26px,6vw,38px);}
  .hero p{color:#3B4560;font-size:14.5px;margin-top:10px;}

  .search-row{
    display:flex;gap:0;margin-top:26px;
    border:2px solid var(--ink);background:var(--cream);
  }
  .search-row input{
    flex:1;border:0;outline:0;background:transparent;
    padding:16px 16px;font-family:'IBM Plex Mono',monospace;
    font-size:15px;letter-spacing:0.03em;color:var(--ink);
    text-transform:uppercase;
  }
  .search-row input::placeholder{color:#9a927a;text-transform:none;letter-spacing:normal;}
  .search-row button{
    border:0;background:var(--signal);color:var(--cream);
    font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:0.06em;
    padding:0 22px;cursor:pointer;transition:background .15s ease;
  }
  .search-row button:hover{background:var(--signal-dark);}
  .search-row button:disabled{background:#b9a98a;cursor:default;}

  #resultArea{padding:10px 0 60px;min-height:40px;}

  .msg-card{
    background:var(--cream);border:2px solid var(--ink);
    padding:26px 24px;margin-top:22px;text-align:center;
  }
  .msg-card .icon{font-size:26px;margin-bottom:10px;}
  .msg-card h3{font-size:17px;margin-bottom:8px;}
  .msg-card p{font-size:14px;color:#3B4560;margin:0;line-height:1.55;}
  .msg-card .contact-line{margin-top:14px;font-family:'IBM Plex Mono',monospace;font-size:13px;}
  .msg-card .contact-line a{color:var(--signal-dark);text-decoration:none;font-weight:600;}

  .result-card{background:var(--cream);border:2px solid var(--ink);margin-top:22px;}
  .result-top{padding:24px 24px 20px;border-bottom:1px dashed var(--line);}
  .ref-row{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;}
  .ref-num{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:0.06em;color:#6b6249;}
  .ref-num strong{color:var(--ink);font-size:16px;}

  .status-badge{
    display:inline-block;padding:6px 14px;
    font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:0.08em;
    text-transform:uppercase;border:1.5px solid currentColor;
  }
  .status-booked{color:var(--ink);}
  .status-picked,.status-transit{color:var(--signal-dark);}
  .status-out{color:var(--route);}
  .status-delivered{color:var(--route);background:rgba(47,104,68,0.08);}
  .status-rto,.status-hold{color:var(--warn);}
  .live-badge{
    display:inline-flex;align-items:center;gap:5px;
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.08em;
    color:var(--route);margin-left:8px;text-transform:uppercase;
  }
  .live-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--route);animation:pulse 1.4s infinite ease-in-out;}

  .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 20px;margin-top:18px;}
  .meta-grid .k{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.1em;color:#6b6249;text-transform:uppercase;}
  .meta-grid .v{font-size:14.5px;margin-top:3px;}
  .carrier-link{
    display:inline-flex;align-items:center;gap:6px;margin-top:16px;
    font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:0.04em;
    color:var(--signal-dark);text-decoration:none;border-bottom:1.5px solid var(--signal-dark);
    padding-bottom:2px;
  }

  .timeline{padding:22px 24px 26px;}
  .timeline .tl-head{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.12em;color:#6b6249;text-transform:uppercase;margin-bottom:16px;}
  .tl-item{position:relative;padding-left:26px;padding-bottom:20px;border-left:2px solid var(--line);}
  .tl-item:last-child{border-left:2px solid transparent;padding-bottom:0;}
  .tl-item::before{
    content:"";position:absolute;left:-7px;top:2px;
    width:12px;height:12px;border-radius:50%;
    background:var(--cream);border:2.5px solid var(--ink);
  }
  .tl-item.current::before{background:var(--signal);border-color:var(--signal);}
  .tl-status{font-family:'Oswald',sans-serif;font-size:15px;letter-spacing:0.02em;text-transform:uppercase;}
  .tl-meta{font-size:13px;color:#3B4560;margin-top:3px;}
  .tl-time{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#6b6249;margin-top:4px;}

  .loading{text-align:center;padding:30px 0;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#6b6249;}
  .loading .dot{display:inline-block;width:6px;height:6px;background:var(--signal);border-radius:50%;margin:0 3px;animation:pulse 1.1s infinite ease-in-out;}
  .loading .dot:nth-child(2){animation-delay:.15s;}
  .loading .dot:nth-child(3){animation-delay:.3s;}
  @keyframes pulse{0%,80%,100%{opacity:0.25;}40%{opacity:1;}}

  footer{padding:24px 0 40px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#6b6249;}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="brand-name">SK LOGISTICS</div>
    <div class="brand-sub">DTDC · RIVIGO — AUTHORIZED FRANCHISEE</div>
  </div>
</header>
<div class="top-tabs">
  <div class="wrap">
    <a href="sk-logistics.html">Home <span class="arrow">→</span></a>
    <a href="SKL_International_Services.html">International Services <span class="arrow">→</span></a>
  </div>
</div>
<div class="barcode"></div>

<div class="wrap">
  <div class="hero">
    <div class="eyebrow mono">Shipment Tracking</div>
    <h1>Where's your parcel?</h1>
    <p>Enter the reference number from your consignment receipt.</p>

    <div class="search-row">
      <input id="refInput" type="text" placeholder="e.g. SKL2607001" autocomplete="off" spellcheck="false">
      <button id="trackBtn">Track →</button>
    </div>
  </div>

  <div id="resultArea"></div>
</div>

<footer>
  Bahadurpura, Hyderabad – 500064 &nbsp;·&nbsp; 89198 55159 / 88865 07472
</footer>

<script>
  // -----------------------------------------------------------------
  // Paste your deployed Google Apps Script Web App URL here.
  // (Deploy > New deployment > Web app in the Apps Script editor)
  // -----------------------------------------------------------------
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfB7BPCWzAJBpRWtIktsqB2gGAJk_RRQVgugkubhhtvKI6W-Dgm-s7ntZiYZ7XqUxa/exec";

  const refInput = document.getElementById('refInput');
  const trackBtn = document.getElementById('trackBtn');
  const resultArea = document.getElementById('resultArea');

  function jsonp(url, params, timeoutMs = 12000) {
    return new Promise((resolve, reject) => {
      const cbName = 'sklcb_' + Math.random().toString(36).slice(2);
      const script = document.createElement('script');
      const qs = new URLSearchParams({ ...params, callback: cbName }).toString();

      const cleanup = () => { delete window[cbName]; script.remove(); };

      window[cbName] = (data) => { cleanup(); resolve(data); };
      script.onerror = () => { cleanup(); reject(new Error('network')); };

      const timer = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, timeoutMs);
      const origResolve = window[cbName];
      window[cbName] = (data) => { clearTimeout(timer); origResolve(data); };

      script.src = url + (url.includes('?') ? '&' : '?') + qs;
      document.body.appendChild(script);
    });
  }

  function statusClass(status) {
    const s = (status || '').toLowerCase();
    if (s.includes('deliver') && !s.includes('out')) return 'status-delivered';
    if (s.includes('out for')) return 'status-out';
    if (s.includes('transit')) return 'status-transit';
    if (s.includes('picked')) return 'status-picked';
    if (s.includes('rto') || s.includes('return')) return 'status-rto';
    if (s.includes('hold') || s.includes('delay')) return 'status-hold';
    return 'status-booked';
  }

  function escapeHtml(str) {
    return String(str ?? '').replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function renderLoading() {
    resultArea.innerHTML = `<div class="loading">Checking network<span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
  }

  function renderNotFound(ref) {
    resultArea.innerHTML = `
      <div class="msg-card">
        <div class="icon">◎</div>
        <h3>No shipment found</h3>
        <p>We couldn't find a booking under <strong>${escapeHtml(ref)}</strong>. Double-check the reference number on your receipt — it's case-insensitive but every character counts.</p>
        <div class="contact-line">Still stuck? Call <a href="tel:+918919855159">89198 55159</a></div>
      </div>`;
  }

  function renderError() {
    resultArea.innerHTML = `
      <div class="msg-card">
        <div class="icon">!</div>
        <h3>Couldn't reach tracking</h3>
        <p>Something went wrong fetching your shipment status. Please try again in a moment.</p>
        <div class="contact-line">Or call <a href="tel:+918919855159">89198 55159</a></div>
      </div>`;
  }

  function renderResult(ref, data) {
    const s = data.shipment;
    const cps = data.checkpoints || [];
    const latest = cps.length ? cps[cps.length - 1] : null;
    const currentStatus = latest ? latest['Status'] : (s['Current Status'] || 'Booked');
    const badgeClass = statusClass(currentStatus);
    const carrierUrl = s['Carrier Tracking URL'];
    const carrierName = s['Carrier Name'];
    const carrierNo = s['Carrier Tracking Number'];

    const carrierLinkHtml = carrierUrl
      ? `<a class="carrier-link" href="${escapeHtml(carrierUrl)}" target="_blank" rel="noopener">
           Track directly with ${escapeHtml(carrierName || 'carrier')}${carrierNo ? ' — ' + escapeHtml(carrierNo) : ''} →
         </a>`
      : '';

    const timelineHtml = cps.length
      ? [...cps].reverse().map((cp, idx) => `
          <div class="tl-item ${idx === 0 ? 'current' : ''}">
            <div class="tl-status">${escapeHtml(cp['Status'])}</div>
            <div class="tl-meta">${escapeHtml(cp['Location'] || '')}${cp['Note'] ? ' — ' + escapeHtml(cp['Note']) : ''}</div>
            <div class="tl-time">${escapeHtml(cp['Timestamp'] || '')}</div>
          </div>`).join('')
      : `<div class="tl-item current"><div class="tl-status">Booked</div><div class="tl-meta">Awaiting first scan</div></div>`;

    resultArea.innerHTML = `
      <div class="result-card">
        <div class="result-top">
          <div class="ref-row">
            <div class="ref-num">REFERENCE<br><strong>${escapeHtml(ref)}</strong></div>
            <span class="status-badge ${badgeClass}">${escapeHtml(currentStatus)}</span>
            ${data.live ? '<span class="live-badge"><span class="dot"></span>Live from carrier</span>' : ''}
          </div>
          <div class="meta-grid">
            <div><div class="k">Receiver</div><div class="v">${escapeHtml(s['Receiver Name'] || '—')}</div></div>
            <div><div class="k">Service</div><div class="v">${escapeHtml(s['Service'] || '—')}</div></div>
            <div><div class="k">From</div><div class="v">${escapeHtml(s['Origin'] || '—')}</div></div>
            <div><div class="k">To</div><div class="v">${escapeHtml(s['Destination'] || '—')}</div></div>
            <div><div class="k">Expected Delivery</div><div class="v">${escapeHtml(s['Expected Delivery'] || '—')}</div></div>
          </div>
          ${carrierLinkHtml}
        </div>
        <div class="timeline">
          <div class="tl-head">Tracking History</div>
          ${timelineHtml}
        </div>
      </div>`;
  }

  async function trackShipment() {
    const ref = refInput.value.trim().toUpperCase();
    if (!ref) { refInput.focus(); return; }

    if (APPS_SCRIPT_URL.includes('PASTE_YOUR')) {
      resultArea.innerHTML = `
        <div class="msg-card">
          <div class="icon">⚙</div>
          <h3>Tracking not connected yet</h3>
          <p>Paste your deployed Google Apps Script Web App URL into the <span style="font-family:'IBM Plex Mono',monospace">APPS_SCRIPT_URL</span> constant near the bottom of this file.</p>
        </div>`;
      return;
    }

    trackBtn.disabled = true;
    renderLoading();

    try {
      const data = await jsonp(APPS_SCRIPT_URL, { ref });
      if (data.found) {
        renderResult(ref, data);
      } else {
        renderNotFound(ref);
      }
    } catch (err) {
      renderError();
    } finally {
      trackBtn.disabled = false;
    }
  }

  trackBtn.addEventListener('click', trackShipment);
  refInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') trackShipment(); });
</script>

</body>
</html>
